  <body>
    <div class="relative" id="app"></div>
    <!--
      ══════════════════════════════════════════════════════
      NETLIFY FORMS — STATIC DETECTION FORM
      Netlify's build bot crawls raw HTML (before Vue runs).
      This hidden form must match EXACTLY:
        • name="contact"           ← same as Vue form
        • all field name= values   ← same as Vue fetch body keys
      ══════════════════════════════════════════════════════
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="company" />
      <input type="text" name="service" />
      <input type="text" name="options" />
      <input type="text" name="budget" />
      <input type="text" name="timeline" />
      <input type="text" name="preferred-contact" />
      <textarea name="message"></textarea>
    </form>
  </body>
